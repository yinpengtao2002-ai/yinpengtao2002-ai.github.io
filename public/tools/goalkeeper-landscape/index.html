<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="screen-orientation" content="landscape">
    <meta name="x5-orientation" content="landscape">
    <meta name="x5-fullscreen" content="true">
    <meta name="full-screen" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>弹力手套守门挑战</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2369c97a'/%3E%3Ccircle cx='32' cy='32' r='16' fill='%23fffdf2'/%3E%3Cpath d='M20 32h24M32 20v24' stroke='%23222' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="manifest" href="/tools/goalkeeper-landscape/manifest.webmanifest">
    <script type="module" crossorigin src="/tools/goalkeeper-landscape/assets/index-DJ-5jczH.js"></script>
    <link rel="stylesheet" crossorigin href="/tools/goalkeeper-landscape/assets/index-BjJDKaKB.css">
  </head>
  <body>
    <main class="app" aria-label="弹力手套守门挑战">
      <section class="game-shell">
        <div class="stage" id="stage">
          <canvas id="gameCanvas" width="1280" height="720" aria-label="弹力手套守门挑战游戏"></canvas>

          <section class="game-hud broadcast-scorebug" id="gameHud" data-hud-system="broadcast-scorebug-compact-hud" aria-label="比赛状态">
            <div class="glass-panel hud-score hud-metric">
              <span class="hud-icon hud-icon-score" aria-hidden="true"></span>
              <span class="hud-label" id="scoreLabel">扑救分</span>
              <strong class="hud-value" id="scoreValue">0</strong>
            </div>

            <div class="glass-panel hud-time hud-metric">
              <span class="hud-icon hud-icon-time" aria-hidden="true"></span>
              <span class="hud-label" id="timeLabel">时间</span>
              <strong class="hud-value" id="timeValue">60</strong>
            </div>

            <div class="hud-actions">
              <div class="glass-panel hud-streak hud-metric">
                <span class="hud-icon hud-icon-streak" aria-hidden="true"></span>
                <span class="hud-label" id="streakLabel">连扑</span>
                <strong class="hud-value" id="streakValue">0</strong>
              </div>
              <div class="glass-panel hud-goals hud-metric">
                <span class="hud-icon hud-icon-goals" aria-hidden="true"></span>
                <span class="hud-label" id="concededLabel">失球</span>
                <strong class="hud-value" id="concededValue">0/5</strong>
              </div>
                <button class="glass-button hud-pause-button" id="pauseButton" type="button" aria-label="暂停挑战">Ⅱ</button>
            </div>
          </section>

          <section class="penalty-scoreboard hidden" id="penaltyScoreboard" data-hud-system="penalty-shootout-score-strip" aria-label="点球大战比分">
            <div class="penalty-heading">
              <strong id="penaltyRoundLabel">第 1 轮</strong>
              <span id="penaltyPhaseLabel">准备扑救</span>
            </div>
            <div class="penalty-team-row">
              <span>我方</span>
              <strong class="penalty-kick-marks" id="penaltyTeamKicks">· · · · ·</strong>
              <b id="penaltyTeamScore">0</b>
            </div>
            <div class="penalty-team-row is-opponent">
              <span>对手</span>
              <strong class="penalty-kick-marks" id="penaltyOpponentKicks">· · · · ·</strong>
              <b id="penaltyOpponentScore">0</b>
            </div>
          </section>
          <div class="penalty-announcement" id="penaltyAnnouncement" aria-live="polite"></div>
          <section class="penalty-round-break" id="penaltyRoundBreak" data-hud-system="penalty-round-score-break" aria-live="polite">
            <span id="penaltyRoundBreakLabel">第 1 轮结束</span>
            <strong id="penaltyRoundBreakScore">0 : 0</strong>
            <p id="penaltyRoundBreakDetail">我方罚球结果</p>
          </section>

          <div class="event-ribbon" id="eventRibbon" data-hud-system="single-match-event-feedback-layer" aria-live="polite"></div>
          <div class="match-status" id="matchStatus" aria-live="polite"></div>
          <div class="pressure-cue" id="pressureCue" aria-live="polite"></div>
          <div class="match-progress" id="matchProgress" role="progressbar" aria-valuemin="0" aria-valuemax="60" aria-valuenow="60" aria-valuetext="剩余 60 秒" data-hud-system="match-progress-hud">
            <span class="match-progress-fill" id="matchProgressFill"></span>
          </div>

          <div class="bottom-controls" id="bottomControls" aria-label="游戏控制">
            <div class="setup-controls">
              <div class="mode-control glass-panel" role="group" aria-label="游戏模式">
                <button class="mode-button is-active" type="button" data-mode="timed" aria-pressed="true">经典</button>
                <button class="mode-button" type="button" data-mode="penalty" aria-pressed="false">点球大战</button>
              </div>
              <div class="difficulty-control glass-panel" role="group" aria-label="难度">
                <button class="difficulty-button" type="button" data-difficulty="easy" aria-pressed="false">容易</button>
                <button class="difficulty-button is-active" type="button" data-difficulty="medium" aria-pressed="true">中等</button>
                <button class="difficulty-button" type="button" data-difficulty="hard" aria-pressed="false">困难</button>
                <button class="difficulty-button hidden" type="button" data-difficulty="extreme" aria-pressed="false">极难</button>
              </div>
              <button class="save-assist-switch is-active" id="saveAssistSwitch" type="button" role="switch" aria-checked="true" aria-label="扑救辅助已开启">
                <span class="save-assist-label">扑救辅助</span>
                <span class="save-assist-track" aria-hidden="true"><i></i></span>
              </button>
            </div>
            <button class="glass-button utility-button" id="soundButton" type="button" aria-label="音乐与音效待启用，开始挑战后会解锁"></button>
            <span class="sound-status" id="soundStatus" data-audio-status-system="match-audio-status-chip" aria-live="polite">点开始后启用音乐与音效</span>
          </div>

          <div class="overlay start-overlay" id="startOverlay">
            <div class="start-panel" data-ui-system="match-hud-flow-polish">
              <p class="start-kicker" id="startKicker">60 秒守门挑战</p>
              <h1 id="startTitle">弹力手套守门</h1>
              <div class="start-rules" aria-label="挑战规则">
                <span id="startRuleA"><strong>60</strong> 秒</span>
                <span id="startRuleB"><strong>5</strong> 失球</span>
                <span id="startRuleC"><strong>x3</strong> 连扑</span>
              </div>
              <button class="start-disc" id="startButton" type="button" aria-label="开始挑战">
                <span aria-hidden="true">▶</span>
                <strong id="startButtonLabel">开始挑战</strong>
              </button>
            </div>
          </div>

          <div class="overlay pause-overlay hidden" id="pauseOverlay" aria-live="polite">
            <div class="pause-panel">
              <div class="pause-copy">
                <span>比赛暂停</span>
                <p class="pause-hint" id="pauseHint" data-pause-hint-system="match-pause-coach-hint">先盯球速，再移动手套</p>
              </div>
              <button class="glass-button pause-resume-button" id="pauseResumeButton" type="button" aria-label="继续挑战">▶ 继续</button>
            </div>
          </div>

          <div class="overlay end-overlay hidden" id="endOverlay" aria-live="polite">
            <div class="result-panel">
              <div class="result-scoreblock">
                <span class="result-grade" id="resultGrade">C级</span>
                <span class="result-kicker" id="resultReason">挑战结束</span>
                <strong id="finalScore">0</strong>
              </div>
              <div class="result-copyblock">
                <p class="result-verdict" id="resultVerdict">先守住中路，再去赌边角</p>
                <p class="result-summary" id="resultSummary">再来一局，读准球路</p>
                <div class="result-stats" aria-label="本局统计">
                  <span><i id="finalSavesLabel">扑救</i> <strong id="finalSaves">0</strong></span>
                  <span><i id="finalBestStreakLabel">连扑</i> <strong id="finalBestStreak">x0</strong></span>
                  <span><i id="finalConcededLabel">失球</i> <strong id="finalConceded">0/5</strong></span>
                </div>
                <p class="result-coach" id="resultCoach" data-result-coach-system="round-result-coach-note">下一局先等球过半，再做大幅移动</p>
                <button id="restartButton" type="button">再来一局</button>
              </div>
            </div>
          </div>

          <div class="rotate-hint">开始后自动横屏</div>
        </div>
      </section>
    </main>

  </body>
</html>
