<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="screen-orientation" content="landscape">
    <meta name="x5-orientation" content="landscape">
    <meta name="x5-fullscreen" content="true">
    <meta name="full-screen" content="yes">
    <title>弹力手套守门挑战</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2369c97a'/%3E%3Ccircle cx='32' cy='32' r='16' fill='%23fffdf2'/%3E%3Cpath d='M20 32h24M32 20v24' stroke='%23222' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app" aria-label="弹力手套守门挑战">
      <section class="game-shell">
        <div class="stage" id="stage">
          <canvas id="gameCanvas" width="1280" height="720" aria-label="弹力手套守门挑战游戏"></canvas>

          <section class="game-hud" aria-label="比赛状态">
            <div class="glass-panel hud-score">
              <span class="hud-icon" aria-hidden="true">PTS</span>
              <span>扑救分</span>
              <strong id="scoreValue">0</strong>
            </div>

            <div class="glass-panel hud-time">
              <span class="hud-icon" aria-hidden="true">TIME</span>
              <span>时间</span>
              <strong id="timeValue">60</strong>
            </div>

            <div class="hud-actions">
              <div class="glass-panel hud-streak">
                <span class="hud-icon" aria-hidden="true">STK</span>
                <span>连扑</span>
                <strong id="streakValue">0</strong>
              </div>
              <div class="glass-panel hud-goals">
                <span class="hud-icon" aria-hidden="true">GA</span>
                <span>失球</span>
                <strong id="concededValue">0/5</strong>
              </div>
              <button class="glass-button" id="pauseButton" type="button" aria-label="暂停">Ⅱ 暂停</button>
            </div>
          </section>

          <div class="bottom-controls" aria-label="游戏控制">
            <button class="glass-button utility-button" id="soundButton" type="button" aria-label="关闭音效">音效开</button>
          </div>

          <div class="overlay start-overlay" id="startOverlay">
            <button class="start-disc" id="startButton" type="button" aria-label="开始挑战">
              <span>拖动后</span>
              <strong>开始</strong>
            </button>
          </div>

          <div class="overlay end-overlay hidden" id="endOverlay" aria-live="polite">
            <div class="result-panel">
              <span class="result-kicker" id="resultReason">挑战结束</span>
              <strong id="finalScore">0</strong>
              <button id="restartButton" type="button">再来一局</button>
            </div>
          </div>

          <div class="rotate-hint">请横屏体验</div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
