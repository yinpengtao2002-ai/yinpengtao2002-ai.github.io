name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install site dependencies
        run: npm ci

      - name: Install Goalkeeper dependencies
        run: npm --prefix tool-sources/goalkeeper-landscape ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run repository guard
        run: npm run check
